<!DOCTYPE html>
<html>
<head>
    <title>Smart News Portal</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body { margin: 0; font-family: Arial; background: #f8f5f2; }
header { background: #7a0019; color: white; text-align: center; padding: 20px; }

.video-box {
    max-width: 900px;
    margin: 50px auto;
    text-align: center;
}

.video-wrapper {
    position: relative;
    width: 100%;
    padding-top: 56.25%;
    background: black;
    border-radius: 10px;
}

.video-wrapper video {
    position: absolute;
    width: 100%;
    height: 100%;
}

button {
    margin-top: 10px;
    padding: 10px 20px;
    background: #7a0019;
    color: white;
    border: none;
    border-radius: 20px;
    cursor: pointer;
}

.no-video {
    color: red;
    margin-top: 20px;
}
</style>
</head>

<body>

<header>
    <h1>📰 Smart News Portal</h1>
</header>

<!-- 🎬 VIDEO -->
<div class="video-box">
    <h2>🎬 Video Playlist</h2>

    <div class="video-wrapper">
        <video id="video-player" controls autoplay muted>
            <source id="video-source" src="" type="video/mp4">
        </video>
    </div>

    <button onclick="nextVideo()">Next Video</button>

    <p id="no-video-msg" class="no-video"></p>
</div>

<!-- 🎬 SCRIPT -->
<script>

// safe fallback if Flask doesn't send videos
const videos = {{ videos | default([]) | tojson }};

let currentIndex = 0;

// shuffle videos
function shuffle(array) {
    for (let i = array.length - 1; i > 0; i--) {
        let j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
    }
}

// play video
function playVideo(index) {
    let player = document.getElementById("video-player");
    let source = document.getElementById("video-source");

    source.src = videos[index];
    player.load();
    player.play();
}

// next video
function nextVideo() {
    currentIndex++;

    if (currentIndex >= videos.length) {
        currentIndex = 0;
        shuffle(videos);
    }

    playVideo(currentIndex);
}

// start
document.addEventListener("DOMContentLoaded", function () {

    if (videos.length === 0) {
        document.getElementById("no-video-msg").innerText =
            "⚠ No videos found in /static/videos/";
        return;
    }

    shuffle(videos);
    playVideo(currentIndex);

    document.getElementById("video-player")
        .addEventListener("ended", nextVideo);
});

</script>

</body>
</html>
