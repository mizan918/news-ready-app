<!DOCTYPE html>
<html>
<head>
<title>Smart News Portal</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body {
    margin:0;
    font-family:Segoe UI;
    background:#f5f2ef;
}

/* HEADER */
header {
    background:#7a0019;
    color:white;
    text-align:center;
    padding:15px;
}

/* LAYOUT */
.wrapper {
    display:flex;
}

/* SIDEBAR */
.sidebar {
    width:240px;
    background:#111;
    color:white;
    height:100vh;
    overflow:auto;
}

.sidebar a {
    display:block;
    padding:10px;
    color:white;
    text-decoration:none;
    border-bottom:1px solid #333;
}

.sidebar a:hover {
    background:#7a0019;
}

/* MAIN */
.main {
    flex:1;
    padding:10px;
}

/* LOVE */
.love-line {
    text-align:center;
    color:#7a0019;
    margin:10px;
}

/* TICKER */
.ticker {
    background:#7a0019;
    color:white;
    overflow:hidden;
    padding:8px;
}

.ticker-move {
    white-space:nowrap;
    animation:ticker 80s linear infinite;
}

.ticker-move:hover {
    animation-play-state: paused;
}

@keyframes ticker {
    0% { transform:translateX(100%); }
    100% { transform:translateX(-100%); }
}

/* READER */
#reader-box {
    margin-top:15px;
}

iframe {
    width:100%;
    height:500px;
    border:none;
}

/* VIDEO */
.video-box {
    max-width:700px;
    margin:30px auto;
    text-align:center;
}

video {
    width:100%;
    max-height:400px;
    border-radius:10px;
}

/* BUTTON */
button {
    padding:8px 15px;
    background:#7a0019;
    color:white;
    border:none;
    border-radius:20px;
    cursor:pointer;
}

</style>
</head>

<body>

<header>
<h2>📰 Smart News Portal</h2>
</header>

<div class="wrapper">

<!-- LEFT -->
<div class="sidebar">
<h3 style="text-align:center;">Newspapers</h3>

{% for paper in newspapers %}
    {% if paper.category == 'bd' %}
        <a href="#" onclick="openNews('{{paper.url}}')">{{paper.name}}</a>
    {% else %}
        <a href="{{paper.url}}" target="_blank">{{paper.name}}</a>
    {% endif %}
{% endfor %}

</div>

<!-- RIGHT -->
<div class="main">

<!-- LOVE -->
<div class="love-line" id="love-text"></div>

<!-- TICKER -->
<div class="ticker">
<div class="ticker-move">
{% for paper in newspapers %}
<span style="margin-right:40px;">{{paper.name}}</span>
{% endfor %}
</div>
</div>

<!-- READER -->
<div id="reader-box">
<iframe id="news-frame"></iframe>
</div>

<!-- FUN -->
<div style="text-align:center; margin-top:20px;">
<h3>🔮 Daily Luck</h3>
<button onclick="generateLuck()">Check</button>
<p id="luck-text"></p>
</div>

<!-- VIDEO -->
<div class="video-box">
<h3>🎬 Video Playlist</h3>
<video id="player" controls autoplay muted></video>
<br>
<button onclick="nextVideo()">Next</button>
</div>

</div>
</div>

<script>

/* LOVE */
const loveTexts = [
"You are my calm — Sadia Islam Mou ❤️",
"My forever — Sadia Islam Mou 💖"
];

document.getElementById("love-text").innerText =
loveTexts[Math.floor(Math.random()*loveTexts.length)];

/* LUCK */
const luckAnswers = [
"আজ ভালো কিছু হবে",
"সুযোগ আসছে",
"ভাগ্য সহায়"
];

function generateLuck(){
    document.getElementById("luck-text").innerText =
    luckAnswers[Math.floor(Math.random()*luckAnswers.length)];
}

/* OPEN NEWS */
function openNews(url){
    document.getElementById("news-frame").src = url;
}

/* VIDEO */
const videos = {{ videos | tojson }};
let i = 0;

function play(){
    if(videos.length === 0) return;
    document.getElementById("player").src = videos[i];
}

function nextVideo(){
    i++;
    if(i >= videos.length) i = 0;
    play();
}

play();

</script>

</body>
</html>
