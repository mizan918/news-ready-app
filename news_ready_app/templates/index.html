<!DOCTYPE html>
<html>
<head>
<title>Smart News Portal</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    display: flex;
    height: 100vh;
}

/* SIDEBAR */
.sidebar {
    width: 270px;
    background: #7a0019;
    color: white;
    padding: 15px;
    overflow-y: auto;
}

.sidebar h2 {
    margin-top: 0;
}

.news-item {
    padding: 10px;
    margin: 6px 0;
    background: rgba(255,255,255,0.1);
    border-radius: 6px;
    cursor: pointer;
}

.news-item:hover {
    background: white;
    color: #7a0019;
}

/* MAIN */
.main {
    flex: 1;
    display: flex;
    flex-direction: column;
}

/* TOPBAR */
.topbar {
    background: #111;
    color: white;
    padding: 10px 20px;
    display: flex;
    justify-content: space-between;
}

/* LOVE */
.love-line {
    text-align: center;
    padding: 6px;
    color: #ffccd5;
    font-style: italic;
}

/* TICKER */
.ticker {
    display: flex;
    background: #a3002a;
    color: white;
    overflow: hidden;
}

.ticker-title {
    background: black;
    padding: 10px;
}

.ticker-move {
    white-space: nowrap;
    animation: ticker 25s linear infinite;
}

.ticker-move span {
    margin-right: 40px;
}

.ticker-move:hover {
    animation-play-state: paused;
}

@keyframes ticker {
    from { transform: translateX(100%); }
    to { transform: translateX(-100%); }
}

/* CONTENT */
.content {
    display: flex;
    flex: 1;
}

/* LEFT FEATURES */
.features {
    width: 330px;
    background: #f4f4f4;
    padding: 15px;
    overflow-y: auto;
}

/* RIGHT VIEW */
.viewer {
    flex: 1;
    position: relative;
}

/* IFRAME */
iframe {
    width: 100%;
    height: 100%;
    border: none;
}

/* MESSAGE */
.message {
    position: absolute;
    top: 40%;
    left: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
}

/* CARD */
.box {
    background: white;
    padding: 15px;
    margin-bottom: 15px;
    border-radius: 10px;
}

/* BUTTON */
button {
    padding: 10px;
    background: #7a0019;
    color: white;
    border: none;
    border-radius: 20px;
    cursor: pointer;
}

button:hover {
    background: #a3002a;
}

video {
    width: 100%;
}

</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
    <h2>📰 Newspapers</h2>

    {% for paper in newspapers %}
    <div class="news-item" onclick="openNews('{{ paper.url }}','{{ paper.name }}')">
        {{ paper.name }}
    </div>
    {% endfor %}
</div>

<!-- MAIN -->
<div class="main">

    <div class="topbar">
        <span id="title">Select a newspaper</span>
        <button onclick="openNewTab()">Open in New Tab</button>
    </div>

    <div class="love-line" id="love-text"></div>

    <!-- TICKER -->
    <div class="ticker">
        <div class="ticker-title">🔥</div>
        <div class="ticker-move">
            {% for paper in newspapers %}
            <span>{{ paper.name }}</span>
            {% endfor %}
        </div>
    </div>

    <div class="content">

        <!-- FEATURES -->
        <div class="features">

            <!-- LUCK -->
            <div class="box">
                <h3>🔮 Daily Luck</h3>
                <button onclick="generateLuck()">Check</button>
                <p id="luck-text"></p>
            </div>

            <!-- VIDEO -->
            <div class="box">
                <h3>🎬 Videos</h3>
                <video id="video-player" controls autoplay muted></video>
                <button onclick="nextVideo()">Next</button>
                <p id="no-video-msg"></p>
            </div>

        </div>

        <!-- VIEWER -->
        <div class="viewer">
            <iframe id="frame"></iframe>
            <div class="message" id="msg">📰 Select news from left</div>
        </div>

    </div>

</div>

<script>

/* GLOBAL */
let currentURL = "";

/* OPEN NEWS */
function openNews(url, name){
    currentURL = url;
    document.getElementById("frame").src = url;
    document.getElementById("title").innerText = name;
    document.getElementById("msg").style.display="none";

    // fallback check
    setTimeout(() => {
        let frame = document.getElementById("frame");
        try {
            if (!frame.contentWindow.location.href) throw "blocked";
        } catch {
            document.getElementById("msg").innerHTML = `
            ⚠ This site cannot be viewed here<br><br>
            <button onclick="openNewTab()">Open in New Tab</button>
            `;
            document.getElementById("msg").style.display="block";
        }
    }, 2000);
}

/* NEW TAB */
function openNewTab(){
    if(currentURL){
        window.open(currentURL, "_blank");
    }
}

/* LOVE */
const loveTexts=[
"You are my calm — Sadia Islam Mou ❤️",
"My forever — Sadia Islam Mou 💖",
"My peace — Sadia Islam Mou 🌙",
"My happiness — Sadia Islam Mou 💫"
];

document.getElementById("love-text").innerText =
loveTexts[Math.floor(Math.random()*loveTexts.length)];

/* LUCK */
const luckAnswers=[
"Big opportunity coming",
"Today is lucky",
"Success ahead",
"Trust your decision",
"Surprise waiting",
"Fortune favors you today",
"Unexpected gain ahead",
"Your effort will pay off",
"A turning point is near",
"Something great is forming"
];

function generateLuck(){
    document.getElementById("luck-text").innerText =
    luckAnswers[Math.floor(Math.random()*luckAnswers.length)];
}

/* VIDEO */
const videos = {{ videos | default([]) | tojson }};
let i=0;

function play(){
    if(videos.length==0){
        document.getElementById("no-video-msg").innerText="No video found";
        return;
    }
    document.getElementById("video-player").src=videos[i];
}

function nextVideo(){
    i++;
    if(i>=videos.length) i=0;
    play();
}

play();

</script>

</body>
</html>
