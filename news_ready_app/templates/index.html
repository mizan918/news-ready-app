<!DOCTYPE html>
<html>
<head>
<title>Smart News Portal</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body {
    margin:0;
    font-family:Segoe UI;
    background:#f4f1ee;
}

/* HEADER */
header {
    background:#7a0019;
    color:white;
    padding:15px;
    text-align:center;
}

/* LOVE TICKER */
.love-ticker {
    background: #fff0f3;
    border-top: 2px solid #7a0019;
    border-bottom: 2px solid #7a0019;
    overflow: hidden;
    padding: 8px 0;
}

.love-track {
    white-space: nowrap;
    display: inline-block;
    animation: loveMove 40s linear infinite;
    color: #7a0019;
    font-weight: 500;
}

.love-track:hover {
    animation-play-state: paused;
}

.love-track span {
    margin-right: 60px;
}

@keyframes loveMove {
    0% { transform: translateX(100%); }
    100% { transform: translateX(-100%); }
}

/* LAYOUT */
.wrapper {
    display:flex;
    height:calc(100vh - 100px);
}

/* SIDEBAR */
.sidebar {
    width:240px;
    background:#111;
    color:white;
    overflow:auto;
}

.sidebar h3 {
    text-align:center;
    padding:10px 0;
}

.sidebar a {
    display:block;
    padding:12px;
    color:white;
    text-decoration:none;
    border-bottom:1px solid #333;
}

.sidebar a:hover {
    background:#7a0019;
}

/* MAIN */
.main {
    flex:1;
    background:#fff;
    display:flex;
    flex-direction:column;
}

/* INFO */
.info {
    padding:10px;
    background:#eee;
    text-align:center;
    font-size:14px;
}

/* READER */
.reader {
    flex:1;
}

iframe {
    width:100%;
    height:100%;
    border:none;
}

</style>
</head>

<body>

<header>
<h2>📰 Smart News Portal</h2>
</header>

<!-- ❤️ MOVING LOVE LINE -->
<div class="love-ticker">
    <div class="love-track" id="love-track"></div>
</div>

<div class="wrapper">

<!-- LEFT SIDEBAR -->
<div class="sidebar">
<h3>Newspapers</h3>

{% for paper in newspapers %}
    {% if paper.category == 'bd' %}
        <a href="#" onclick="openNews('{{paper.url}}')">{{paper.name}}</a>
    {% else %}
        <a href="{{paper.url}}" target="_blank">{{paper.name}}</a>
    {% endif %}
{% endfor %}

</div>

<!-- RIGHT SIDE -->
<div class="main">

<div class="info">
👉 Click Bangla newspaper to read inside | English opens in new tab
</div>

<div class="reader">
<iframe id="news-frame" src="https://www.prothomalo.com"></iframe>
</div>

</div>

</div>

<script>

/* LOVE TEXTS */
const loveTexts = [
"In a world full of noise, you are my calm — Sadia Islam Mou ❤️",
"You are my peace, my strength, my forever — Sadia Islam Mou 💖",
"My heart finds home in you — Sadia Islam Mou 🌙",
"Every moment with you feels like a blessing — Sadia Islam Mou ✨",
"You are the reason behind my smile — Sadia Islam Mou 😊",
"With you, life feels complete — Sadia Islam Mou 💫",
"No matter what happens, I choose you — Sadia Islam Mou ❤️",
"You are my today and all my tomorrows — Sadia Islam Mou 💕"
];

const track = document.getElementById("love-track");

loveTexts.forEach(text => {
    const span = document.createElement("span");
    span.innerText = text;
    track.appendChild(span);
});

/* OPEN NEWS */
function openNews(url){
    document.getElementById("news-frame").src = url;
}

</script>

</body>
</html>
