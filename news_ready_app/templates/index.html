<!DOCTYPE html>
<html>
<head>
<title>Smart News Portal</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body {
    margin:0;
    font-family:Segoe UI;
    background:#f4f1ee;
}

/* HEADER */
header {
    background:#7a0019;
    color:white;
    padding:15px;
    text-align:center;
}

/* LAYOUT */
.wrapper {
    display:flex;
    height:100vh;
}

/* SIDEBAR */
.sidebar {
    width:240px;
    background:#111;
    color:white;
    overflow:auto;
}

.sidebar h3 {
    text-align:center;
    padding:10px 0;
}

.sidebar a {
    display:block;
    padding:12px;
    color:white;
    text-decoration:none;
    border-bottom:1px solid #333;
}

.sidebar a:hover {
    background:#7a0019;
}

/* MAIN VIEW */
.main {
    flex:1;
    background:#fff;
    display:flex;
    flex-direction:column;
}

/* INFO BAR */
.info {
    padding:10px;
    background:#eee;
    text-align:center;
    font-size:14px;
}

/* READER */
.reader {
    flex:1;
}

iframe {
    width:100%;
    height:100%;
    border:none;
}

/* LOVE LINE (kept minimal) */
.love-line {
    text-align:center;
    padding:5px;
    font-size:13px;
    color:#7a0019;
}

</style>
</head>

<body>

<header>
<h2>📰 Smart News Portal</h2>
</header>

<div class="wrapper">

<!-- LEFT SIDEBAR -->
<div class="sidebar">

<h3>Newspapers</h3>

{% for paper in newspapers %}
    {% if paper.category == 'bd' %}
        <a href="#" onclick="openNews('{{paper.url}}')">{{paper.name}}</a>
    {% else %}
        <a href="{{paper.url}}" target="_blank">{{paper.name}}</a>
    {% endif %}
{% endfor %}

</div>

<!-- RIGHT MAIN -->
<div class="main">

<div class="love-line">
In a world full of noise, you are my calm — Sadia Islam Mou ❤️
</div>

<div class="info">
👉 Click Bangla newspaper to read inside | English opens in new tab
</div>

<div class="reader">
<iframe id="news-frame" src="https://www.prothomalo.com"></iframe>
</div>

</div>

</div>

<script>

function openNews(url){
    document.getElementById("news-frame").src = url;
}

</script>

</body>
</html>
