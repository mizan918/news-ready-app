<!DOCTYPE html>
<html>
<head>
    <title>Smart News Portal</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background: linear-gradient(to right, #1e3c72, #2a5298);
            color: white;
        }

        header {
            text-align: center;
            padding: 25px;
        }

        .container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            padding: 20px;
        }

        .card {
            background: white;
            color: black;
            padding: 15px;
            border-radius: 10px;
            text-align: center;
        }

        a {
            text-decoration: none;
            color: #2a5298;
            font-weight: bold;
        }
    </style>
</head>

<body>

<header>
    <h1>📰 Smart News Portal</h1>
</header>

<h2 style="text-align:center;">🇧🇩 Bangladeshi News</h2>
<div class="container">
    {% for paper in newspapers %}
        {% if paper.category == 'bd' %}
        <div class="card">
            <a href="{{ paper.url }}" target="_blank">{{ paper.name }}</a>
        </div>
        {% endif %}
    {% endfor %}
</div>

<h2 style="text-align:center;">🌍 International News</h2>
<div class="container">
    {% for paper in newspapers %}
        {% if paper.category == 'int' %}
        <div class="card">
            <a href="{{ paper.url }}" target="_blank">{{ paper.name }}</a>
        </div>
        {% endif %}
    {% endfor %}
</div>

</body>

</html>
