<!DOCTYPE html>
<html>
<head>
    <title>Smart News Portal</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body {
    margin: 0;
    font-family: Arial;
}

/* HEADER */
header {
    background: #7a0019;
    color: white;
    text-align: center;
    padding: 15px;
}

/* LOVE LINE */
.love-line {
    background: #f8f5f2;
    color: #7a0019;
    overflow: hidden;
    white-space: nowrap;
}

.love-move {
    display: inline-block;
    padding: 8px;
    animation: loveMove 12s linear infinite;
}

@keyframes loveMove {
    0% { transform: translateX(100%); }
    100% { transform: translateX(-100%); }
}

/* LAYOUT */
.main {
    display: flex;
    height: calc(100vh - 110px);
}

/* SIDEBAR */
.sidebar {
    width: 250px;
    background: #111;
    color: white;
    overflow-y: auto;
}

.sidebar a {
    display: block;
    padding: 12px;
    color: white;
    text-decoration: none;
    border-bottom: 1px solid #333;
}

.sidebar a:hover {
    background: #7a0019;
}

/* CONTENT */
.content {
    flex: 1;
}

iframe {
    width: 100%;
    height: 100%;
    border: none;
}

/* MOBILE */
@media(max-width:768px){

    .main {
        display: block;
    }

    .sidebar {
        width: 100%;
        display: flex;
        overflow-x: auto;
    }

    .sidebar a {
        white-space: nowrap;
        border-right: 1px solid #333;
        border-bottom: none;
    }

    .content {
        display: none; /* hide iframe completely */
    }
}
</style>
</head>

<body>

<header>
    <h2>📰 Smart News Portal</h2>
</header>

<!-- LOVE LINE -->
<div class="love-line">
    <div class="love-move">
        In a world full of noise, you are my calm — Sadia Islam Mou ❤️ |
        You are my peace and happiness — Sadia Islam Mou 💖 |
        With you, life feels complete — Sadia Islam Mou 🌙 |
        My heart always chooses you — Sadia Islam Mou 💫
    </div>
</div>

<div class="main">

    <!-- SIDEBAR -->
    <div class="sidebar">
        {% for paper in newspapers %}
            <a href="#"
               onclick="openNews('{{ paper.url }}','{{ paper.category }}')">
               {{ paper.name }}
            </a>
        {% endfor %}
    </div>

    <!-- CONTENT -->
    <div class="content">
        <iframe id="viewer"></iframe>
    </div>

</div>

<script>
function isMobile() {
    return window.innerWidth <= 768;
}

function openNews(url, category) {

    // 📱 MOBILE → always open new tab (fix blank issue)
    if (isMobile()) {
        window.open(url, "_blank");
        return;
    }

    // 💻 DESKTOP
    if (category === "bd") {
        document.getElementById("viewer").src = url;
    } else {
        window.open(url, "_blank");
    }
}
</script>

</body>
</html>
