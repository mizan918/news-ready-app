<!DOCTYPE html>
<html>
<head>
<title>Smart News Portal</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body { margin:0; font-family:'Segoe UI'; background:#f8f5f2; }

/* HEADER */
header {
    background:#7a0019;
    color:white;
    text-align:center;
    padding:20px;
}

/* LAYOUT */
.wrapper {
    display:flex;
}

/* SIDEBAR */
.sidebar {
    width:250px;
    background:#111;
    color:white;
    height:100vh;
    overflow:auto;
}

.sidebar h3 {
    text-align:center;
    padding:10px;
}

.sidebar div {
    padding:12px;
    border-bottom:1px solid #333;
    cursor:pointer;
}

.sidebar div:hover {
    background:#7a0019;
}

/* MAIN */
.main {
    flex:1;
}

/* NEWS GRID */
.container {
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
    gap:20px;
    padding:20px;
}

.card {
    background:white;
    padding:15px;
    border-radius:12px;
    box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

.card img {
    width:100%;
    border-radius:10px;
}

button {
    padding:10px;
    background:#7a0019;
    color:white;
    border:none;
    border-radius:20px;
    cursor:pointer;
}

</style>
</head>

<body>

<header>
<h1>📰 Smart News Portal</h1>
</header>

<div class="wrapper">

<!-- LEFT SIDEBAR -->
<div class="sidebar">
<h3>📰 Newspapers</h3>

{% for paper in newspapers %}
<div onclick="window.open('{{paper.url}}','_blank')">
{{paper.name}}
</div>
{% endfor %}

</div>

<!-- RIGHT CONTENT -->
<div class="main">

<div class="container">
{% for n in news %}
<div class="card">
    {% if n.image %}
    <img src="{{n.image}}">
    {% endif %}
    <h3>{{n.title}}</h3>
    <p>{{n.desc}}</p>
    <button onclick="window.open('{{n.link}}','_blank')">Read Full</button>
</div>
{% endfor %}
</div>

</div>

</div>

</body>
</html>
