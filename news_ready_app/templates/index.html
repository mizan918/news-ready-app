<!DOCTYPE html>
<html>
<head>
    <title>Smart News Portal</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', Tahoma, sans-serif;
    background: #f8f5f2;
}

header {
    background: #7a0019;
    color: white;
    text-align: center;
    padding: 25px;
}

.love-line {
    text-align: center;
    padding: 10px;
    font-style: italic;
    color: #7a0019;
}

.video-box {
    max-width: 900px;
    margin: 50px auto;
    text-align: center;
}

.video-wrapper {
    position: relative;
    width: 100%;
    padding-top: 56.25%;
    background: black;
    border-radius: 12px;
    overflow: hidden;
}

.video-wrapper video {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
}

.video-box button {
    margin-top: 15px;
    padding: 12px 28px;
    border-radius: 30px;
    border: none;
    background: #7a0019;
    color: white;
    cursor: pointer;
}

footer {
    text-align: center;
    padding: 20px;
    color: #666;
}
</style>
</head>

<body>

<header>
    <h1>📰 Smart News Portal</h1>
</header>

<div class="love-line">
    <span id="love-text"></span>
</div>

<!-- 🎬 VIDEO SECTION -->
<div class="video-box">
    <h2>🎬 Video Playlist</h2>

    <div class="video-wrapper">
        <video id="video-player" controls autoplay muted>
            <source id="video-source" src="" type="video/mp4">
        </video>
    </div>

    <button onclick="nextVideo()">⏭ Next Video</button>
</div>

<footer>
    © 2026 | Built by Mizanur Rahman
</footer>

<!-- ❤️ LOVE -->
<script>
const loveTexts = [
"In a world full of noise, you are my calm ❤️ --- Sadia Islam Mou",
"You are my peace, my strength 💖 --- Sadia Islam Mou",
"Every moment feels brighter with you 🌙 --- Sadia Islam Mou",
"My heart chose you again 💫 --- Sadia Islam Mou"
];

function showLove() {
    let t = loveTexts[Math.floor(Math.random() * loveTexts.length)];
    document.getElementById("love-text").innerText = t;
}
</script>

<!-- 🎬 VIDEO PLAYLIST SCRIPT -->
<script>
const videos = {{ videos | tojson }};

let currentIndex = 0;

// shuffle videos
function shuffle(array) {
    for (let i = array.length - 1; i > 0; i--) {
        let j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
    }
}

// play video by index
function playVideo(index) {
    let player = document.getElementById("video-player");
    let source = document.getElementById("video-source");

    source.src = videos[index];
    player.load();
    player.play();
}

// next video
function nextVideo() {
    currentIndex++;

    if (currentIndex >= videos.length) {
        currentIndex = 0;
        shuffle(videos); // reshuffle each loop
    }

    playVideo(currentIndex);
}

// start everything
document.addEventListener("DOMContentLoaded", function () {
    showLove();

    if (videos.length === 0) return;

    shuffle(videos);
    playVideo(currentIndex);

    document.getElementById("video-player").addEventListener("ended", nextVideo);
});
</script>

</body>
</html>
