<!DOCTYPE html>
<html>
<head>
<title>Smart News Portal</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body { margin:0; font-family:'Segoe UI'; }

/* HEADER */
header {
    background:#7a0019;
    color:white;
    text-align:center;
    padding:20px;
}

/* LOVE */
.love-line {
    text-align:center;
    color:#7a0019;
    font-style:italic;
    margin:10px;
}

/* TICKER */
.ticker {
    display:flex;
    background:#7a0019;
    color:white;
    overflow:hidden;
}
.ticker-move {
    white-space:nowrap;
    animation:ticker 25s linear infinite;
}
.ticker-move:hover { animation-play-state: paused; }
.ticker-move span { margin-right:40px; }

@keyframes ticker {
    from{transform:translateX(100%)}
    to{transform:translateX(-100%)}
}

/* GRID */
.container {
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:15px;
    padding:20px;
}

/* CARD */
.card {
    background:white;
    padding:10px;
    border-radius:10px;
    box-shadow:0 3px 10px rgba(0,0,0,0.1);
}
.card img { width:100%; border-radius:10px; }

/* LUCK */
.luck-box {
    text-align:center;
    margin:30px;
}

/* VIDEO */
.video-box {
    max-width:800px;
    margin:30px auto;
}

/* BUTTON */
button {
    padding:10px;
    background:#7a0019;
    color:white;
    border:none;
    border-radius:20px;
    cursor:pointer;
}
</style>
</head>

<body>

<header>
<h1>📰 Smart News Portal</h1>
</header>

<!-- LOVE -->
<div class="love-line" id="love-text"></div>

<!-- TICKER -->
<div class="ticker">
<div class="ticker-move">
{% for n in news %}
<span>{{n.title}}</span>
{% endfor %}
</div>
</div>

<!-- API NEWS -->
<div class="container">
{% for n in news %}
<div class="card">
    {% if n.image %}
    <img src="{{n.image}}">
    {% endif %}
    <h3>{{n.title}}</h3>
    <p>{{n.desc}}</p>
    <button onclick="window.open('{{n.link}}','_blank')">Read More</button>
</div>
{% endfor %}
</div>

<!-- LUCK -->
<div class="luck-box">
<h2>🔮 Daily Luck</h2>
<button onclick="generateLuck()">Check</button>
<p id="luck-text"></p>
</div>

<!-- VIDEO -->
<div class="video-box">
<h2>🎬 Videos</h2>
<video id="video-player" controls autoplay muted></video>
<button onclick="nextVideo()">Next</button>
<p id="no-video-msg"></p>
</div>

<script>

/* LOVE */
const loveTexts=[
"In a world full of noise, you are my calm — Sadia Islam Mou ❤️",
"My forever — Sadia Islam Mou 💖",
"My peace — Sadia Islam Mou 🌙"
];
document.getElementById("love-text").innerText =
loveTexts[Math.floor(Math.random()*loveTexts.length)];

/* LUCK */
const luckAnswers=[
"A big opportunity is coming",
"Today is your lucky day",
"Success ahead",
"Surprise coming",
"Trust your decision"
];
function generateLuck(){
document.getElementById("luck-text").innerText =
luckAnswers[Math.floor(Math.random()*luckAnswers.length)];
}

/* VIDEO */
const videos = {{ videos | default([]) | tojson | safe }};
let i=0;

function play(){
    if(videos.length===0){
        document.getElementById("no-video-msg").innerText="No video";
        return;
    }
    document.getElementById("video-player").src=videos[i];
}

function nextVideo(){
    i++;
    if(i>=videos.length) i=0;
    play();
}

play();

</script>

</body>
</html>
